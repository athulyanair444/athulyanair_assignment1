  <title>Thank You</title>
  <link href="style.css" rel="stylesheet" />

  <script>
    function setBannerDate() {
      const now = new Date();
      const options = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
      document.getElementById("todayDate").textContent = now.toLocaleDateString(undefined, options);
    }
    window.addEventListener("DOMContentLoaded", setBannerDate);
  </script>
</head>

<body>
  <div id="banner">
    <div class="banner-left">
      <img src="logo.png" alt="WeRDocs Medical Logo" id="logo" />

      <p class="tagline">Patient Registration</p>
    </div>

    <div class="banner-right">
      <p class="date-line">Today is:</p>
      <p class="date" id="todayDate"></p>
    </div>
  </div>

  <div id="main">
    <h2>Thank you for your submission.</h2>
    <p>We have received your registration information.</p>
    <p><a href="patient-form.html">Return to the Registration Form</a></p>
  </div>

      <strong>WeRDocs Medical</strong><br />
      PO BOX 18881<br />
      Sugar Land, TX 77496
    </div>

    <div class="footer-center">
      <button type="button" class="btn footer-btn" onclick="alert('Contact Us: info@werdocs.example')">
        CONTACT US
      </button>
    </div>

    <div class="footer-right">
      <a href="https://www.facebook.com" target="_blank" rel="noopener">Facebook</a>
